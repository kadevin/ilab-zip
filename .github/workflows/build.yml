name: Build & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-15
    strategy:
      matrix:
        arch: [arm64, x86_64]
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Xcode Project
      run: xcodegen generate

    - name: Build (${{ matrix.arch }})
      run: |
        xcodebuild build \
          -scheme iLab-zip \
          -destination 'platform=macOS,arch=${{ matrix.arch }}' \
          -skipPackagePluginValidation \
          ARCHS="${{ matrix.arch }}" \
          ONLY_ACTIVE_ARCH=NO \
          CODE_SIGN_IDENTITY="-" \
          CODE_SIGNING_REQUIRED=NO \
          ENABLE_USER_SCRIPT_SANDBOXING=NO \
          | xcpretty || true

    - name: Run Tests (${{ matrix.arch }})
      run: |
        xcodebuild test \
          -scheme iLab-zip \
          -destination 'platform=macOS,arch=${{ matrix.arch }}' \
          -skipPackagePluginValidation \
          ARCHS="${{ matrix.arch }}" \
          ONLY_ACTIVE_ARCH=NO \
          CODE_SIGN_IDENTITY="-" \
          CODE_SIGNING_REQUIRED=NO \
          ENABLE_USER_SCRIPT_SANDBOXING=NO \
          | xcpretty || true
