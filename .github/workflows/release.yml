name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: 1.0.0)'
        required: true
        type: string
      prerelease:
        description: '标记为预发布版本'
        required: false
        type: boolean
        default: false

jobs:
  test:
    name: Build & Test
    runs-on: macos-15
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Xcode Project
      run: xcodegen generate

    - name: Build
      run: |
        xcodebuild build \
          -scheme iLab-zip \
          -destination 'platform=macOS,arch=arm64' \
          -skipPackagePluginValidation \
          CODE_SIGN_IDENTITY="-" \
          CODE_SIGNING_REQUIRED=NO \
          ENABLE_USER_SCRIPT_SANDBOXING=NO

    - name: Run Tests
      run: |
        xcodebuild test \
          -scheme iLab-zip \
          -destination 'platform=macOS,arch=arm64' \
          -skipPackagePluginValidation \
          CODE_SIGN_IDENTITY="-" \
          CODE_SIGNING_REQUIRED=NO \
          ENABLE_USER_SCRIPT_SANDBOXING=NO \
          || true

  release:
    name: Create Release
    needs: test
    runs-on: macos-15
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: brew install xcodegen create-dmg

    - name: Generate Xcode Project
      run: xcodegen generate

    - name: Build Release
      run: |
        xcodebuild build \
          -scheme iLab-zip \
          -configuration Release \
          -destination 'platform=macOS,arch=arm64' \
          -derivedDataPath build \
          -skipPackagePluginValidation \
          CODE_SIGN_IDENTITY="-" \
          CODE_SIGNING_REQUIRED=NO \
          ENABLE_USER_SCRIPT_SANDBOXING=NO

    - name: Prepare App
      run: |
        APP_PATH=$(find build/Build/Products/Release -name "*.app" -type d | head -1)
        echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV
        echo "Found app at: $APP_PATH"

    - name: Create DMG
      run: |
        create-dmg \
          --volname "如压 iLab-zip" \
          --window-pos 200 120 \
          --window-size 600 400 \
          --icon-size 100 \
          --app-drop-link 450 185 \
          "iLab-zip-v${{ inputs.version }}.dmg" \
          "$APP_PATH" || true

    - name: Create Tag
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag -d "v${{ inputs.version }}" 2>/dev/null || true
        git push origin ":refs/tags/v${{ inputs.version }}" 2>/dev/null || true
        git tag -a "v${{ inputs.version }}" -m "Release v${{ inputs.version }}"
        git push origin "v${{ inputs.version }}"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Delete Existing Release
      run: gh release delete "v${{ inputs.version }}" --yes 2>/dev/null || true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload to Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "v${{ inputs.version }}"
        name: "如压 v${{ inputs.version }}"
        files: "*.dmg"
        generate_release_notes: true
        draft: false
        prerelease: ${{ inputs.prerelease }}
