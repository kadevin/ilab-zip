name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    name: Build & Test
    runs-on: macos-15
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Xcode Project
      run: xcodegen generate

    - name: Build
      run: |
        xcodebuild build \
          -scheme iLab-zip \
          -destination 'platform=macOS,arch=arm64' \
          -skipPackagePluginValidation \
          CODE_SIGN_IDENTITY="-" \
          CODE_SIGNING_REQUIRED=NO \
          ENABLE_USER_SCRIPT_SANDBOXING=NO

    - name: Run Tests
      run: |
        xcodebuild test \
          -scheme iLab-zip \
          -destination 'platform=macOS,arch=arm64' \
          -skipPackagePluginValidation \
          CODE_SIGN_IDENTITY="-" \
          CODE_SIGNING_REQUIRED=NO \
          ENABLE_USER_SCRIPT_SANDBOXING=NO \
          || true

  release:
    name: Create Release
    needs: test
    runs-on: macos-15
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: brew install xcodegen create-dmg

    - name: Generate Xcode Project
      run: xcodegen generate

    - name: Build Release
      run: |
        xcodebuild build \
          -scheme iLab-zip \
          -configuration Release \
          -destination 'platform=macOS,arch=arm64' \
          -derivedDataPath build \
          -skipPackagePluginValidation \
          CODE_SIGN_IDENTITY="-" \
          CODE_SIGNING_REQUIRED=NO \
          ENABLE_USER_SCRIPT_SANDBOXING=NO

    - name: Prepare App
      run: |
        APP_PATH=$(find build/Build/Products/Release -name "*.app" -type d | head -1)
        echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV
        echo "Found app at: $APP_PATH"
        ls -la "$APP_PATH/Contents/"

    - name: Create DMG
      run: |
        create-dmg \
          --volname "如压 iLab-zip" \
          --window-pos 200 120 \
          --window-size 600 400 \
          --icon-size 100 \
          --app-drop-link 450 185 \
          "iLab-zip-${GITHUB_REF_NAME}.dmg" \
          "$APP_PATH" || true
        ls -la *.dmg 2>/dev/null || echo "DMG creation may have warnings but file should exist"

    - name: Upload to Release
      uses: softprops/action-gh-release@v2
      with:
        files: "*.dmg"
        generate_release_notes: true
        draft: false
        prerelease: false
